<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#121824">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sikka | Smart Business Directory</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <img src="assets/icons/logo.svg" alt="Sikka">
        <h1>Sikka</h1>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="showAuthModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- HOME PAGE -->
      <div id="page-home" class="page active">
        <div class="search-container">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search businesses, categories...">
          </div>
          <div id="search-results" style="display: none; position: absolute; left: 20px; right: 20px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); z-index: 50; max-height: 300px; overflow-y: auto;"></div>
        </div>

        <div class="hero-banner">
          <h2>Find Local Businesses</h2>
          <p>Discover the best shops, restaurants, and services near you</p>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-title">Categories</span>
            <button class="section-link">See All</button>
          </div>
          <div id="categories-list" class="categories-scroll"></div>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-title">Top Businesses</span>
            <button class="section-link" onclick="navigateTo('home')">See All</button>
          </div>
          <div id="businesses-list"></div>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-title">Latest Articles</span>
            <button class="section-link" onclick="navigateTo('blog')">See All</button>
          </div>
          <div id="posts-list"></div>
        </div>
      </div>

      <!-- BLOG PAGE -->
      <div id="page-blog" class="page">
        <div class="page-title">Blog</div>
        <div class="section">
          <div id="blog-list"></div>
        </div>
      </div>

      <!-- ADD LISTING PAGE -->
      <div id="page-add" class="page">
        <div class="page-title">Add Listing</div>
        <div class="section">
          <div id="add-listing-form">
            <div class="form-group">
              <label class="form-label">Business Name *</label>
              <input type="text" class="form-input" id="biz-name" placeholder="Enter business name">
            </div>
            <div class="form-group">
              <label class="form-label">Business Name (Arabic)</label>
              <input type="text" class="form-input" id="biz-name-ar" placeholder="اسم النشاط التجاري">
            </div>
            <div class="form-group">
              <label class="form-label">Category *</label>
              <select class="form-input form-select" id="biz-category">
                <option value="">Select category</option>
                <option value="coffee-shops">Coffee Shops</option>
                <option value="restaurants">Restaurants</option>
                <option value="shopping">Shopping</option>
                <option value="services">Services</option>
                <option value="health">Health & Beauty</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number *</label>
              <input type="tel" class="form-input" id="biz-phone" placeholder="+966 5XX XXX XXXX">
            </div>
            <div class="form-group">
              <label class="form-label">WhatsApp</label>
              <input type="tel" class="form-input" id="biz-whatsapp" placeholder="+966 5XX XXX XXXX">
            </div>
            <div class="form-group">
              <label class="form-label">City *</label>
              <input type="text" class="form-input" id="biz-city" placeholder="e.g. Riyadh">
            </div>
            <div class="form-group">
              <label class="form-label">Address *</label>
              <input type="text" class="form-input" id="biz-address" placeholder="Full address">
            </div>
            <div class="form-group">
              <label class="form-label">Description</label>
              <textarea class="form-input form-textarea" id="biz-description" placeholder="Tell people about your business..."></textarea>
            </div>
            <div style="display: flex; gap: 12px;">
              <div class="form-group" style="flex:1">
                <label class="form-label">Latitude</label>
                <input type="number" step="any" class="form-input" id="biz-lat" placeholder="24.7136">
              </div>
              <div class="form-group" style="flex:1">
                <label class="form-label">Longitude</label>
                <input type="number" step="any" class="form-input" id="biz-lng" placeholder="46.6753">
              </div>
            </div>
            <button class="btn-primary" onclick="submitBusiness()" style="margin-top: 8px;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              Add Listing
            </button>
          </div>
        </div>
      </div>

      <!-- PROFILE PAGE -->
      <div id="page-profile" class="page">
        <div class="profile-header">
          <div class="profile-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="profile-name" id="profile-name">Guest</div>
          <div class="profile-email" id="profile-email">Sign in to access your profile</div>
        </div>

        <div id="auth-buttons" class="section">
          <button class="btn-primary" onclick="showAuthModal()" style="margin-bottom: 12px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Sign In
          </button>
        </div>

        <div id="profile-menu" class="profile-menu" style="display: none;">
          <div class="profile-menu-item" onclick="navigateTo('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>My Listings</span>
            <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </div>
          <div class="profile-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span>Favorites</span>
            <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </div>
          <div class="profile-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Settings</span>
            <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </div>
          <div class="profile-menu-item" onclick="logout()" style="color: var(--danger);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>Sign Out</span>
          </div>
        </div>
      </div>

      <!-- BUSINESS DETAIL PAGE -->
      <div id="page-business" class="page">
        <div id="business-detail"></div>
      </div>

      <!-- POST DETAIL PAGE -->
      <div id="page-post-detail" class="page">
        <div id="post-detail"></div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-page="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-page="blog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
        </svg>
        <span>Blog</span>
      </button>
      <div class="nav-item nav-item-center">
        <button class="center-btn" onclick="navigateTo('add')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <button class="nav-item" data-page="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>

    <!-- Auth Modal -->
    <div id="auth-modal" class="auth-modal" onclick="if(event.target===this)hideAuthModal()">
      <div class="auth-sheet">
        <div class="auth-handle"></div>
        <div class="auth-title">Welcome to Sikka</div>
        <div class="auth-subtitle">Sign in to add listings and save favorites</div>

        <input type="tel" class="auth-input" id="phone-input" placeholder="+966 5XX XXX XXXX">

        <div id="recaptcha-container"></div>

        <button class="btn-primary" onclick="loginWithPhone()" style="margin-bottom: 12px;">
          Continue with Phone
        </button>

        <div class="auth-divider">or</div>

        <button class="google-btn" onclick="loginWithGoogle()">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <button class="btn-secondary" onclick="hideAuthModal()" style="margin-top: 12px;">
          Cancel
        </button>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';

    const response = await fetch('/api/config');
    const { firebase: config } = await response.json();

    if (config?.apiKey) {
      initializeApp(config);
    }
  </script>

  <script src="js/app.js"></script>
</body>
</html>
